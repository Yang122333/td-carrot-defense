<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">
  <defs>
    <radialGradient id="ice2-body" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#90CAF9"/>
      <stop offset="40%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </radialGradient>
    <radialGradient id="ice2-inner" cx="38%" cy="32%" r="45%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.4)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <radialGradient id="ice2-eyeglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#82B1FF"/>
      <stop offset="60%" stop-color="#448AFF"/>
      <stop offset="100%" stop-color="#2962FF"/>
    </radialGradient>
    <filter id="ice2-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#00000044"/>
    </filter>
    <filter id="ice2-blueglow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ice2-eyeshine" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Frost aura -->
  <ellipse cx="20" cy="22" rx="18" ry="17" fill="#1565C0" opacity="0.1" filter="url(#ice2-blueglow)"/>
  <!-- Frost base -->
  <ellipse cx="20" cy="37" rx="13" ry="3" fill="#90CAF9" opacity="0.35" filter="url(#ice2-blueglow)"/>
  <!-- Main body -->
  <ellipse cx="20" cy="22" rx="12" ry="13" fill="url(#ice2-body)" stroke="#0D47A1" stroke-width="0.8" filter="url(#ice2-shadow)" opacity="0.95"/>
  <!-- Frost pattern overlay -->
  <path d="M13 14 Q15 18 12 22 Q14 26 13 30" fill="none" stroke="#90CAF9" stroke-width="0.5" opacity="0.5"/>
  <path d="M27 14 Q25 18 28 22 Q26 26 27 30" fill="none" stroke="#90CAF9" stroke-width="0.5" opacity="0.5"/>
  <path d="M16 10 Q18 14 20 10 Q22 14 24 10" fill="none" stroke="#BBDEFB" stroke-width="0.4" opacity="0.4"/>
  <path d="M15 32 Q18 28 20 32 Q22 28 25 32" fill="none" stroke="#BBDEFB" stroke-width="0.4" opacity="0.4"/>
  <!-- Detailed frost flowers -->
  <circle cx="15" cy="16" r="1" fill="none" stroke="#E3F2FD" stroke-width="0.3" opacity="0.6"/>
  <circle cx="25" cy="27" r="1.2" fill="none" stroke="#E3F2FD" stroke-width="0.3" opacity="0.5"/>
  <circle cx="13" cy="24" r="0.8" fill="none" stroke="#BBDEFB" stroke-width="0.3" opacity="0.5"/>
  <!-- Inner highlight -->
  <ellipse cx="20" cy="22" rx="12" ry="13" fill="url(#ice2-inner)"/>
  <!-- Glowing blue eyes -->
  <ellipse cx="16" cy="20" rx="3" ry="2.5" fill="#0D47A1" stroke="#1A237E" stroke-width="0.4"/>
  <ellipse cx="16" cy="20" rx="2.2" ry="1.8" fill="url(#ice2-eyeglow)" filter="url(#ice2-eyeshine)"/>
  <circle cx="15.5" cy="19.5" r="0.7" fill="white" opacity="0.8"/>
  <ellipse cx="24" cy="20" rx="3" ry="2.5" fill="#0D47A1" stroke="#1A237E" stroke-width="0.4"/>
  <ellipse cx="24" cy="20" rx="2.2" ry="1.8" fill="url(#ice2-eyeglow)" filter="url(#ice2-eyeshine)"/>
  <circle cx="23.5" cy="19.5" r="0.7" fill="white" opacity="0.8"/>
  <!-- Stern mouth -->
  <path d="M17 25.5 L23 25.5" fill="none" stroke="#1A237E" stroke-width="0.8" stroke-linecap="round"/>
  <!-- Rotating ice crystal shards -->
  <g filter="url(#ice2-blueglow)">
    <!-- Top shard -->
    <polygon points="20,2 18.5,6 20,5 21.5,6" fill="#BBDEFB" opacity="0.8" stroke="#90CAF9" stroke-width="0.2"/>
    <!-- Left shard -->
    <polygon points="4,18 8,16.5 7,18 8,19.5" fill="#90CAF9" opacity="0.7" stroke="#64B5F6" stroke-width="0.2"/>
    <!-- Right shard -->
    <polygon points="36,17 32,15.5 33,17 32,18.5" fill="#90CAF9" opacity="0.7" stroke="#64B5F6" stroke-width="0.2"/>
    <!-- Bottom-left shard -->
    <polygon points="7,32 10,30 9.5,32 10,34" fill="#BBDEFB" opacity="0.6" stroke="#90CAF9" stroke-width="0.2"/>
    <!-- Bottom-right shard -->
    <polygon points="33,31 30,29.5 30.5,31 30,32.5" fill="#BBDEFB" opacity="0.6" stroke="#90CAF9" stroke-width="0.2"/>
    <!-- Extra small crystals -->
    <polygon points="11,6 12,8 13,6 12,7" fill="#E3F2FD" opacity="0.5"/>
    <polygon points="29,7 30,9 31,7 30,8" fill="#E3F2FD" opacity="0.5"/>
  </g>
</svg>