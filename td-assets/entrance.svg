<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="ent-wood" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A1887F"/>
      <stop offset="30%" stop-color="#8D6E63"/>
      <stop offset="100%" stop-color="#5D4037"/>
    </linearGradient>
    <linearGradient id="ent-woodside" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6D4C41"/>
      <stop offset="100%" stop-color="#3E2723"/>
    </linearGradient>
    <linearGradient id="ent-grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <linearGradient id="ent-arrow" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#D32F2F"/>
      <stop offset="100%" stop-color="#F44336"/>
    </linearGradient>
    <filter id="ent-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0.5" dy="1" stdDeviation="0.8" flood-color="#00000044"/>
    </filter>
  </defs>
  <!-- Grass base -->
  <ellipse cx="16" cy="30" rx="12" ry="3" fill="url(#ent-grass)" opacity="0.8"/>
  <!-- Grass blades -->
  <path d="M8 29 Q7 26 6 28" fill="none" stroke="#4CAF50" stroke-width="0.6" stroke-linecap="round"/>
  <path d="M11 28.5 Q10 25 9 27.5" fill="none" stroke="#43A047" stroke-width="0.5" stroke-linecap="round"/>
  <path d="M21 28.5 Q22 25 23 27.5" fill="none" stroke="#43A047" stroke-width="0.5" stroke-linecap="round"/>
  <path d="M24 29 Q25 26 26 28" fill="none" stroke="#4CAF50" stroke-width="0.6" stroke-linecap="round"/>
  <!-- Sign post (stick) -->
  <rect x="14.5" y="18" width="3" height="12" rx="0.5" fill="url(#ent-woodside)" stroke="#3E2723" stroke-width="0.4"/>
  <!-- Wood grain on post -->
  <line x1="15.5" y1="19" x2="15.5" y2="29" stroke="#4E342E" stroke-width="0.2" opacity="0.4"/>
  <line x1="16.5" y1="20" x2="16.5" y2="28" stroke="#4E342E" stroke-width="0.2" opacity="0.3"/>
  <!-- Wooden sign board -->
  <rect x="4" y="8" width="24" height="14" rx="2" fill="url(#ent-wood)" stroke="#3E2723" stroke-width="0.7" filter="url(#ent-shadow)"/>
  <!-- Wood plank lines -->
  <line x1="4" y1="12" x2="28" y2="12" stroke="#5D4037" stroke-width="0.3" opacity="0.4"/>
  <line x1="4" y1="16" x2="28" y2="16" stroke="#5D4037" stroke-width="0.3" opacity="0.3"/>
  <!-- Wood grain -->
  <path d="M6 9 Q10 10 14 9" fill="none" stroke="#6D4C41" stroke-width="0.2" opacity="0.4"/>
  <path d="M18 10 Q22 11 26 10" fill="none" stroke="#6D4C41" stroke-width="0.2" opacity="0.3"/>
  <path d="M8 18 Q12 19 16 18" fill="none" stroke="#6D4C41" stroke-width="0.2" opacity="0.3"/>
  <!-- Cracks -->
  <path d="M7 9 L8 13 L7.5 15" fill="none" stroke="#4E342E" stroke-width="0.3" opacity="0.5"/>
  <path d="M25 10 L24.5 14" fill="none" stroke="#4E342E" stroke-width="0.3" opacity="0.4"/>
  <!-- Nails -->
  <circle cx="6" cy="10" r="0.8" fill="#9E9E9E" stroke="#616161" stroke-width="0.3"/>
  <circle cx="26" cy="10" r="0.8" fill="#9E9E9E" stroke="#616161" stroke-width="0.3"/>
  <circle cx="6" cy="19" r="0.8" fill="#9E9E9E" stroke="#616161" stroke-width="0.3"/>
  <circle cx="26" cy="19" r="0.8" fill="#9E9E9E" stroke="#616161" stroke-width="0.3"/>
  <!-- Nail highlights -->
  <circle cx="5.7" cy="9.7" r="0.25" fill="white" opacity="0.5"/>
  <circle cx="25.7" cy="9.7" r="0.25" fill="white" opacity="0.5"/>
  <!-- Red paint 「虫」character -->
  <text x="16" y="18" text-anchor="middle" font-size="10" fill="#D32F2F" font-weight="bold" font-family="serif" opacity="0.9">虫</text>
  <!-- Paint drip -->
  <path d="M19 19.5 Q19.5 21 19 22" fill="none" stroke="#D32F2F" stroke-width="0.5" opacity="0.6" stroke-linecap="round"/>
  <!-- Red arrow on top -->
  <polygon points="16,1 22,5 19,5 19,8 13,8 13,5 10,5" fill="url(#ent-arrow)" stroke="#B71C1C" stroke-width="0.4" filter="url(#ent-shadow)"/>
  <!-- Arrow highlight -->
  <polygon points="16,2 19,4.5 17,4.5 17,7 15,7 15,4.5 13,4.5" fill="white" opacity="0.15"/>
</svg>