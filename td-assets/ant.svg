<svg xmlns="http://www.w3.org/2000/svg" width="28" height="24" viewBox="0 0 28 24">
  <defs>
    <radialGradient id="ant-body" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#D32F2F"/>
      <stop offset="50%" stop-color="#B71C1C"/>
      <stop offset="100%" stop-color="#7F0000"/>
    </radialGradient>
    <radialGradient id="ant-head" cx="42%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#EF5350"/>
      <stop offset="50%" stop-color="#C62828"/>
      <stop offset="100%" stop-color="#8B0000"/>
    </radialGradient>
    <radialGradient id="ant-high" cx="35%" cy="30%" r="40%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.4)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <linearGradient id="ant-bandana" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="50%" stop-color="#FFC107"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
    <filter id="ant-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0.8" stdDeviation="0.7" flood-color="#00000044"/>
    </filter>
  </defs>
  <!-- Legs - 6 thin legs -->
  <g stroke="#7F0000" stroke-width="0.7" fill="none" stroke-linecap="round">
    <!-- Left legs -->
    <path d="M9 14 Q6 16 3 18"/>
    <path d="M10 16 Q7 19 4 21"/>
    <path d="M12 17 Q10 20 7 22"/>
    <!-- Right legs -->
    <path d="M17 14 Q20 16 23 18"/>
    <path d="M16 16 Q19 19 22 21"/>
    <path d="M15 17 Q17 20 20 22"/>
  </g>
  <!-- Leg tips -->
  <g fill="#4E0000">
    <circle cx="3" cy="18" r="0.5"/>
    <circle cx="4" cy="21" r="0.5"/>
    <circle cx="7" cy="22" r="0.5"/>
    <circle cx="23" cy="18" r="0.5"/>
    <circle cx="22" cy="21" r="0.5"/>
    <circle cx="20" cy="22" r="0.5"/>
  </g>
  <!-- Abdomen (back) -->
  <ellipse cx="18" cy="13" rx="5" ry="4.5" fill="url(#ant-body)" stroke="#4E0000" stroke-width="0.6" filter="url(#ant-shadow)"/>
  <ellipse cx="18" cy="13" rx="5" ry="4.5" fill="url(#ant-high)"/>
  <!-- Thorax (middle) -->
  <ellipse cx="13" cy="12" rx="3.5" ry="3.5" fill="url(#ant-body)" stroke="#4E0000" stroke-width="0.5" filter="url(#ant-shadow)"/>
  <ellipse cx="13" cy="12" rx="3.5" ry="3.5" fill="url(#ant-high)"/>
  <!-- Head -->
  <ellipse cx="8" cy="10" rx="4.5" ry="4" fill="url(#ant-head)" stroke="#4E0000" stroke-width="0.6" filter="url(#ant-shadow)"/>
  <ellipse cx="8" cy="10" rx="4.5" ry="4" fill="url(#ant-high)"/>
  <!-- Gold pirate bandana -->
  <path d="M4 8 Q8 5.5 12 8" fill="url(#ant-bandana)" stroke="#E65100" stroke-width="0.4"/>
  <path d="M4 8 Q3 7 3.5 6.5" fill="url(#ant-bandana)" stroke="#E65100" stroke-width="0.3"/>
  <!-- Bandana knot tail -->
  <path d="M12 8 L14 7 L13.5 9" fill="#FFC107" stroke="#E65100" stroke-width="0.3"/>
  <!-- Bandana dots -->
  <circle cx="6" cy="7.2" r="0.4" fill="#E65100" opacity="0.5"/>
  <circle cx="8" cy="6.8" r="0.4" fill="#E65100" opacity="0.5"/>
  <circle cx="10" cy="7.2" r="0.4" fill="#E65100" opacity="0.5"/>
  <!-- Curved antennae -->
  <path d="M6 7 Q4 3 2 2" fill="none" stroke="#8B0000" stroke-width="0.6" stroke-linecap="round"/>
  <path d="M9 7 Q10 3 12 2" fill="none" stroke="#8B0000" stroke-width="0.6" stroke-linecap="round"/>
  <circle cx="2" cy="1.8" r="0.7" fill="#C62828"/>
  <circle cx="12" cy="1.8" r="0.7" fill="#C62828"/>
  <!-- Sneaky slanted eyes -->
  <ellipse cx="6.5" cy="10" rx="1.5" ry="1.2" fill="white" stroke="#4E0000" stroke-width="0.3" transform="rotate(-10 6.5 10)"/>
  <ellipse cx="10" cy="10" rx="1.5" ry="1.2" fill="white" stroke="#4E0000" stroke-width="0.3" transform="rotate(10 10 10)"/>
  <!-- Pupils looking sideways -->
  <circle cx="7" cy="10.2" r="0.8" fill="#1A0000"/>
  <circle cx="10.5" cy="10.2" r="0.8" fill="#1A0000"/>
  <circle cx="6.7" cy="9.8" r="0.3" fill="white"/>
  <circle cx="10.2" cy="9.8" r="0.3" fill="white"/>
  <!-- Sneaky grin -->
  <path d="M6 12.5 Q8 14 10.5 12" fill="none" stroke="#4E0000" stroke-width="0.6" stroke-linecap="round"/>
  <!-- Mandibles -->
  <path d="M5 13 Q4 14.5 5 15" fill="none" stroke="#7F0000" stroke-width="0.5" stroke-linecap="round"/>
  <path d="M11 13 Q12 14.5 11 15" fill="none" stroke="#7F0000" stroke-width="0.5" stroke-linecap="round"/>
  <!-- Shell shine -->
  <ellipse cx="17" cy="11" rx="1.5" ry="0.8" fill="white" opacity="0.2" transform="rotate(-20 17 11)"/>
</svg>