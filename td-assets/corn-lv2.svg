<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">
  <defs>
    <radialGradient id="corn2-body" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#FFE44D"/>
      <stop offset="60%" stop-color="#F5C518"/>
      <stop offset="100%" stop-color="#D4A010"/>
    </radialGradient>
    <radialGradient id="corn2-highlight" cx="35%" cy="30%" r="40%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.6)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <linearGradient id="corn2-hat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4CAF50"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <linearGradient id="corn2-dirt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8D6E4C"/>
      <stop offset="100%" stop-color="#5D4037"/>
    </linearGradient>
    <radialGradient id="corn2-glow-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD60066"/>
      <stop offset="100%" stop-color="#FFD60000"/>
    </radialGradient>
    <linearGradient id="corn2-glasses" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#333"/>
      <stop offset="50%" stop-color="#111"/>
      <stop offset="100%" stop-color="#444"/>
    </linearGradient>
    <filter id="corn2-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#00000044"/>
    </filter>
    <filter id="corn2-goldglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Gold aura -->
  <ellipse cx="20" cy="22" rx="18" ry="16" fill="url(#corn2-glow-grad)" filter="url(#corn2-goldglow)"/>
  <!-- Dirt base -->
  <ellipse cx="20" cy="37" rx="12" ry="3" fill="url(#corn2-dirt)" opacity="0.8"/>
  <ellipse cx="20" cy="37" rx="8" ry="2" fill="#A1887F" opacity="0.4"/>
  <!-- Body -->
  <rect x="12" y="12" width="16" height="22" rx="7" ry="7" fill="url(#corn2-body)" stroke="#C49000" stroke-width="0.8" filter="url(#corn2-shadow)"/>
  <!-- Kernel rows -->
  <g opacity="0.7">
    <circle cx="15" cy="18" r="1.8" fill="#FFD54F" stroke="#E6B800" stroke-width="0.3"/>
    <circle cx="20" cy="17" r="1.8" fill="#FFD54F" stroke="#E6B800" stroke-width="0.3"/>
    <circle cx="25" cy="18" r="1.8" fill="#FFD54F" stroke="#E6B800" stroke-width="0.3"/>
    <circle cx="14.5" cy="22" r="1.8" fill="#FFCA28" stroke="#E6B800" stroke-width="0.3"/>
    <circle cx="19.5" cy="21.5" r="1.8" fill="#FFCA28" stroke="#E6B800" stroke-width="0.3"/>
    <circle cx="24.5" cy="22" r="1.8" fill="#FFCA28" stroke="#E6B800" stroke-width="0.3"/>
    <circle cx="15" cy="26" r="1.8" fill="#FFC107" stroke="#E6B800" stroke-width="0.3"/>
    <circle cx="20" cy="25.5" r="1.8" fill="#FFC107" stroke="#E6B800" stroke-width="0.3"/>
    <circle cx="25" cy="26" r="1.8" fill="#FFC107" stroke="#E6B800" stroke-width="0.3"/>
    <circle cx="14.5" cy="30" r="1.8" fill="#FFB300" stroke="#E6B800" stroke-width="0.3"/>
    <circle cx="19.5" cy="29.5" r="1.8" fill="#FFB300" stroke="#E6B800" stroke-width="0.3"/>
    <circle cx="24.5" cy="30" r="1.8" fill="#FFB300" stroke="#E6B800" stroke-width="0.3"/>
  </g>
  <!-- Body highlight -->
  <rect x="12" y="12" width="16" height="22" rx="7" ry="7" fill="url(#corn2-highlight)"/>
  <!-- Beret hat -->
  <ellipse cx="20" cy="12" rx="10" ry="4" fill="url(#corn2-hat)" stroke="#1B5E20" stroke-width="0.6"/>
  <path d="M12 12 Q14 6 20 5 Q26 6 28 12" fill="url(#corn2-hat)" stroke="#1B5E20" stroke-width="0.6"/>
  <!-- Two stars on hat -->
  <text x="17" y="9.5" text-anchor="middle" font-size="2.8" fill="#FFD600" font-weight="bold">★</text>
  <text x="23" y="9.5" text-anchor="middle" font-size="2.8" fill="#FFD600" font-weight="bold">★</text>
  <!-- Cool sunglasses -->
  <rect x="13.5" y="17" width="5.5" height="4" rx="1" fill="url(#corn2-glasses)" stroke="#000" stroke-width="0.4"/>
  <rect x="21" y="17" width="5.5" height="4" rx="1" fill="url(#corn2-glasses)" stroke="#000" stroke-width="0.4"/>
  <line x1="19" y1="18.5" x2="21" y2="18.5" stroke="#222" stroke-width="0.6"/>
  <line x1="13.5" y1="18.5" x2="11" y2="17" stroke="#222" stroke-width="0.6"/>
  <line x1="26.5" y1="18.5" x2="29" y2="17" stroke="#222" stroke-width="0.6"/>
  <!-- Lens glare -->
  <line x1="14.5" y1="17.8" x2="15.5" y2="18.8" stroke="rgba(255,255,255,0.4)" stroke-width="0.5"/>
  <line x1="22" y1="17.8" x2="23" y2="18.8" stroke="rgba(255,255,255,0.4)" stroke-width="0.5"/>
  <!-- Cool smirk -->
  <path d="M17 24 Q20 26.5 23 23.5" fill="none" stroke="#5D4037" stroke-width="0.8" stroke-linecap="round"/>
  <!-- Arms -->
  <path d="M11 22 Q8 21 6 19" fill="none" stroke="#D4A010" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M29 22 Q31 24 32 23" fill="none" stroke="#D4A010" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Sparkle particles -->
  <text x="6" y="12" font-size="3" fill="#FFD600" opacity="0.8">✦</text>
  <text x="33" y="14" font-size="2.5" fill="#FFE082" opacity="0.7">✦</text>
  <text x="8" y="32" font-size="2" fill="#FFD600" opacity="0.6">✦</text>
  <text x="32" y="30" font-size="2.5" fill="#FFE082" opacity="0.7">✦</text>
</svg>