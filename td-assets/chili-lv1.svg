<svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 44 44">
  <defs>
    <radialGradient id="chili1-body" cx="48%" cy="42%" r="50%">
      <stop offset="0%" stop-color="#FF5252"/>
      <stop offset="50%" stop-color="#D32F2F"/>
      <stop offset="100%" stop-color="#B71C1C"/>
    </radialGradient>
    <radialGradient id="chili1-highlight" cx="35%" cy="30%" r="40%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.45)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <radialGradient id="chili1-face" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#FF8A80"/>
      <stop offset="100%" stop-color="#FF5252"/>
    </radialGradient>
    <linearGradient id="chili1-flame1" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#FF6D00"/>
      <stop offset="40%" stop-color="#FF9100"/>
      <stop offset="70%" stop-color="#FFAB00"/>
      <stop offset="100%" stop-color="#FFD600" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="chili1-flame2" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#DD2C00"/>
      <stop offset="50%" stop-color="#FF3D00"/>
      <stop offset="100%" stop-color="#FF6D00" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="chili1-flame3" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#FFAB00"/>
      <stop offset="100%" stop-color="#FFF9C4" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="chili1-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.2" flood-color="#00000044"/>
    </filter>
    <filter id="chili1-flameglow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Flame effect - outer layer -->
  <path d="M16 12 Q14 4 18 2 Q20 6 22 1 Q24 5 26 3 Q28 8 28 12" fill="url(#chili1-flame2)" opacity="0.7" filter="url(#chili1-flameglow)"/>
  <!-- Flame effect - middle layer -->
  <path d="M18 12 Q17 6 20 4 Q22 7 24 5 Q26 9 26 12" fill="url(#chili1-flame1)" opacity="0.85" filter="url(#chili1-flameglow)"/>
  <!-- Flame effect - inner bright core -->
  <path d="M20 12 Q19 8 22 6 Q24 9 24 12" fill="url(#chili1-flame3)" opacity="0.9"/>
  <!-- Main body - fat round chili -->
  <ellipse cx="22" cy="26" rx="13" ry="14" fill="url(#chili1-body)" stroke="#8B0000" stroke-width="0.8" filter="url(#chili1-shadow)"/>
  <!-- Body highlight -->
  <ellipse cx="22" cy="26" rx="13" ry="14" fill="url(#chili1-highlight)"/>
  <!-- Glossy shine streak -->
  <ellipse cx="16" cy="20" rx="2" ry="6" fill="white" opacity="0.15" transform="rotate(-15 16 20)"/>
  <!-- Angry wide eyes -->
  <ellipse cx="17" cy="23" rx="3.5" ry="3.8" fill="white" stroke="#4E342E" stroke-width="0.5"/>
  <ellipse cx="27" cy="23" rx="3.5" ry="3.8" fill="white" stroke="#4E342E" stroke-width="0.5"/>
  <!-- Angry eyebrows -->
  <path d="M13 19 L19 20.5" fill="none" stroke="#4E342E" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M31 19 L25 20.5" fill="none" stroke="#4E342E" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Pupils -->
  <circle cx="17.5" cy="23.5" r="2" fill="#1B0000"/>
  <circle cx="27.5" cy="23.5" r="2" fill="#1B0000"/>
  <!-- Eye highlights -->
  <circle cx="16.5" cy="22.5" r="0.8" fill="white"/>
  <circle cx="26.5" cy="22.5" r="0.8" fill="white"/>
  <circle cx="18" cy="24" r="0.4" fill="white"/>
  <circle cx="28" cy="24" r="0.4" fill="white"/>
  <!-- Open mouth with teeth -->
  <ellipse cx="22" cy="31" rx="5" ry="4" fill="#4E0000"/>
  <rect x="19" y="30.5" width="2" height="1.5" rx="0.3" fill="white"/>
  <rect x="23" y="30.5" width="2" height="1.5" rx="0.3" fill="white"/>
  <!-- Tongue -->
  <ellipse cx="22" cy="33.5" rx="2.5" ry="1.2" fill="#FF5252"/>
  <!-- Sweat drops -->
  <ellipse cx="12" cy="20" rx="1" ry="1.5" fill="#81D4FA" opacity="0.7"/>
  <ellipse cx="33" cy="21" rx="0.8" ry="1.2" fill="#81D4FA" opacity="0.6"/>
  <!-- Red flush on cheeks -->
  <ellipse cx="13" cy="27" rx="2.5" ry="1.5" fill="#FF1744" opacity="0.3"/>
  <ellipse cx="31" cy="27" rx="2.5" ry="1.5" fill="#FF1744" opacity="0.3"/>
  <!-- Stem on top -->
  <rect x="20.5" y="11" width="3" height="3" rx="1" fill="#2E7D32"/>
</svg>