<svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 10 10">
  <defs>
    <radialGradient id="bfire-core" cx="45%" cy="42%" r="50%">
      <stop offset="0%" stop-color="#FFF9C4"/>
      <stop offset="30%" stop-color="#FFAB00"/>
      <stop offset="70%" stop-color="#FF6D00"/>
      <stop offset="100%" stop-color="#DD2C00"/>
    </radialGradient>
    <radialGradient id="bfire-outer" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF6D00" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#DD2C00" stop-opacity="0"/>
    </radialGradient>
    <filter id="bfire-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Outer glow -->
  <circle cx="5" cy="5" r="4.5" fill="url(#bfire-outer)" filter="url(#bfire-glow)"/>
  <!-- Flame shape outer -->
  <path d="M5 1 Q7.5 3 7.5 5 Q8 7 5 9 Q2 7 2.5 5 Q2.5 3 5 1Z" fill="#FF6D00" opacity="0.8"/>
  <!-- Flame shape inner -->
  <path d="M5 2.5 Q6.5 3.5 6.5 5 Q6.8 6.5 5 7.5 Q3.2 6.5 3.5 5 Q3.5 3.5 5 2.5Z" fill="url(#bfire-core)" filter="url(#bfire-glow)"/>
  <!-- Bright center -->
  <ellipse cx="5" cy="5" rx="1.2" ry="1.5" fill="#FFF9C4" opacity="0.7"/>
  <!-- Spark particles -->
  <circle cx="2" cy="2.5" r="0.4" fill="#FFAB00" opacity="0.7"/>
  <circle cx="8" cy="3" r="0.35" fill="#FF6D00" opacity="0.6"/>
  <circle cx="7.5" cy="7.5" r="0.3" fill="#FFAB00" opacity="0.5"/>
  <circle cx="2.5" cy="7" r="0.3" fill="#FF9100" opacity="0.5"/>
</svg>