<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">
  <defs>
    <radialGradient id="corn1-body" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#FFE44D"/>
      <stop offset="60%" stop-color="#F5C518"/>
      <stop offset="100%" stop-color="#D4A010"/>
    </radialGradient>
    <radialGradient id="corn1-highlight" cx="35%" cy="30%" r="40%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.6)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <linearGradient id="corn1-hat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4CAF50"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <linearGradient id="corn1-dirt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8D6E4C"/>
      <stop offset="100%" stop-color="#5D4037"/>
    </linearGradient>
    <radialGradient id="corn1-bullet" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#FFFDE7"/>
      <stop offset="50%" stop-color="#FFD600"/>
      <stop offset="100%" stop-color="#F9A825"/>
    </radialGradient>
    <filter id="corn1-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#00000044"/>
    </filter>
    <filter id="corn1-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Dirt base -->
  <ellipse cx="20" cy="37" rx="12" ry="3" fill="url(#corn1-dirt)" opacity="0.8"/>
  <ellipse cx="20" cy="37" rx="8" ry="2" fill="#A1887F" opacity="0.4"/>
  <!-- Body - corn cob -->
  <rect x="12" y="12" width="16" height="22" rx="7" ry="7" fill="url(#corn1-body)" stroke="#C49000" stroke-width="0.8" filter="url(#corn1-shadow)"/>
  <!-- Corn kernel rows -->
  <g opacity="0.7">
    <circle cx="15" cy="18" r="1.8" fill="#FFD54F" stroke="#E6B800" stroke-width="0.3"/>
    <circle cx="20" cy="17" r="1.8" fill="#FFD54F" stroke="#E6B800" stroke-width="0.3"/>
    <circle cx="25" cy="18" r="1.8" fill="#FFD54F" stroke="#E6B800" stroke-width="0.3"/>
    <circle cx="14.5" cy="22" r="1.8" fill="#FFCA28" stroke="#E6B800" stroke-width="0.3"/>
    <circle cx="19.5" cy="21.5" r="1.8" fill="#FFCA28" stroke="#E6B800" stroke-width="0.3"/>
    <circle cx="24.5" cy="22" r="1.8" fill="#FFCA28" stroke="#E6B800" stroke-width="0.3"/>
    <circle cx="15" cy="26" r="1.8" fill="#FFC107" stroke="#E6B800" stroke-width="0.3"/>
    <circle cx="20" cy="25.5" r="1.8" fill="#FFC107" stroke="#E6B800" stroke-width="0.3"/>
    <circle cx="25" cy="26" r="1.8" fill="#FFC107" stroke="#E6B800" stroke-width="0.3"/>
    <circle cx="14.5" cy="30" r="1.8" fill="#FFB300" stroke="#E6B800" stroke-width="0.3"/>
    <circle cx="19.5" cy="29.5" r="1.8" fill="#FFB300" stroke="#E6B800" stroke-width="0.3"/>
    <circle cx="24.5" cy="30" r="1.8" fill="#FFB300" stroke="#E6B800" stroke-width="0.3"/>
  </g>
  <!-- Body highlight -->
  <rect x="12" y="12" width="16" height="22" rx="7" ry="7" fill="url(#corn1-highlight)"/>
  <!-- Beret hat -->
  <ellipse cx="20" cy="12" rx="10" ry="4" fill="url(#corn1-hat)" stroke="#1B5E20" stroke-width="0.6"/>
  <path d="M12 12 Q14 6 20 5 Q26 6 28 12" fill="url(#corn1-hat)" stroke="#1B5E20" stroke-width="0.6"/>
  <!-- Hat badge -->
  <circle cx="20" cy="8" r="2" fill="#FFD600" stroke="#F9A825" stroke-width="0.4"/>
  <text x="20" y="9.5" text-anchor="middle" font-size="2.5" fill="#E65100" font-weight="bold">★</text>
  <!-- Eyes -->
  <ellipse cx="17" cy="19" rx="2.5" ry="2.8" fill="white" stroke="#333" stroke-width="0.5"/>
  <ellipse cx="23" cy="19" rx="2.5" ry="2.8" fill="white" stroke="#333" stroke-width="0.5"/>
  <circle cx="17.5" cy="19" r="1.5" fill="#2C1B0E"/>
  <circle cx="23.5" cy="19" r="1.5" fill="#2C1B0E"/>
  <!-- Eye highlights -->
  <circle cx="16.8" cy="18" r="0.7" fill="white"/>
  <circle cx="22.8" cy="18" r="0.7" fill="white"/>
  <!-- Confident smile -->
  <path d="M17 24 Q20 27 23 24" fill="none" stroke="#5D4037" stroke-width="0.8" stroke-linecap="round"/>
  <!-- Left arm holding bullet -->
  <path d="M11 22 Q8 21 6 19" fill="none" stroke="#D4A010" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Glowing corn bullet in hand -->
  <circle cx="5.5" cy="18.5" r="2.2" fill="url(#corn1-bullet)" stroke="#F9A825" stroke-width="0.4" filter="url(#corn1-glow)"/>
  <!-- Right arm -->
  <path d="M29 22 Q31 24 32 23" fill="none" stroke="#D4A010" stroke-width="1.5" stroke-linecap="round"/>
</svg>