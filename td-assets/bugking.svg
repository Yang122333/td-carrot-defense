<svg xmlns="http://www.w3.org/2000/svg" width="56" height="48" viewBox="0 0 56 48">
  <defs>
    <radialGradient id="bk-body" cx="48%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#CE93D8"/>
      <stop offset="40%" stop-color="#9C27B0"/>
      <stop offset="100%" stop-color="#6A1B9A"/>
    </radialGradient>
    <radialGradient id="bk-high" cx="38%" cy="30%" r="42%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.4)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <radialGradient id="bk-seg" cx="48%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#BA68C8"/>
      <stop offset="50%" stop-color="#8E24AA"/>
      <stop offset="100%" stop-color="#6A1B9A"/>
    </radialGradient>
    <linearGradient id="bk-crown" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#F9A825"/>
      <stop offset="50%" stop-color="#FFD600"/>
      <stop offset="100%" stop-color="#FFF176"/>
    </linearGradient>
    <radialGradient id="bk-gem" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#FF5252"/>
      <stop offset="50%" stop-color="#D32F2F"/>
      <stop offset="100%" stop-color="#B71C1C"/>
    </radialGradient>
    <radialGradient id="bk-aura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#CE93D8" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#9C27B0" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#6A1B9A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bk-gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD600"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
    <filter id="bk-shadow" x="-15%" y="-15%" width="130%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-color="#00000055"/>
    </filter>
    <filter id="bk-auraglow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bk-crownglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Purple energy aura -->
  <ellipse cx="28" cy="28" rx="27" ry="22" fill="url(#bk-aura)" filter="url(#bk-auraglow)"/>
  <!-- Tiny feet -->
  <g fill="#6A1B9A" opacity="0.6">
    <ellipse cx="14" cy="44" rx="1.2" ry="1.5"/>
    <ellipse cx="18" cy="45" rx="1.2" ry="1.5"/>
    <ellipse cx="24" cy="45.5" rx="1.2" ry="1.5"/>
    <ellipse cx="30" cy="45.5" rx="1.2" ry="1.5"/>
    <ellipse cx="36" cy="45" rx="1.2" ry="1.5"/>
    <ellipse cx="42" cy="44" rx="1.2" ry="1.5"/>
  </g>
  <!-- Body segments back to front -->
  <!-- Tail segment -->
  <ellipse cx="44" cy="34" rx="6" ry="7" fill="url(#bk-seg)" stroke="#4A148C" stroke-width="0.7" filter="url(#bk-shadow)"/>
  <ellipse cx="44" cy="34" rx="6" ry="7" fill="url(#bk-high)"/>
  <!-- Gold pattern on tail -->
  <path d="M42 30 Q44 28 46 30" fill="none" stroke="url(#bk-gold)" stroke-width="0.5" opacity="0.6"/>
  <!-- Segment 4 -->
  <ellipse cx="37" cy="32" rx="6.5" ry="8" fill="url(#bk-seg)" stroke="#4A148C" stroke-width="0.7" filter="url(#bk-shadow)"/>
  <ellipse cx="37" cy="32" rx="6.5" ry="8" fill="url(#bk-high)"/>
  <path d="M35 28 Q37 26 39 28" fill="none" stroke="url(#bk-gold)" stroke-width="0.5" opacity="0.6"/>
  <!-- Segment 3 -->
  <ellipse cx="29" cy="30" rx="7" ry="9" fill="url(#bk-seg)" stroke="#4A148C" stroke-width="0.7" filter="url(#bk-shadow)"/>
  <ellipse cx="29" cy="30" rx="7" ry="9" fill="url(#bk-high)"/>
  <path d="M27 26 Q29 24 31 26" fill="none" stroke="url(#bk-gold)" stroke-width="0.5" opacity="0.6"/>
  <!-- Segment 2 -->
  <ellipse cx="21" cy="28" rx="7.5" ry="9.5" fill="url(#bk-body)" stroke="#4A148C" stroke-width="0.7" filter="url(#bk-shadow)"/>
  <ellipse cx="21" cy="28" rx="7.5" ry="9.5" fill="url(#bk-high)"/>
  <path d="M19 24 Q21 22 23 24" fill="none" stroke="url(#bk-gold)" stroke-width="0.6" opacity="0.7"/>
  <!-- Head (biggest) -->
  <ellipse cx="12" cy="24" rx="9" ry="10" fill="url(#bk-body)" stroke="#4A148C" stroke-width="0.8" filter="url(#bk-shadow)"/>
  <ellipse cx="12" cy="24" rx="9" ry="10" fill="url(#bk-high)"/>
  <!-- Gold ornate patterns on head -->
  <path d="M7 20 Q9 18 11 20" fill="none" stroke="url(#bk-gold)" stroke-width="0.6" opacity="0.7"/>
  <path d="M13 20 Q15 18 17 20" fill="none" stroke="url(#bk-gold)" stroke-width="0.6" opacity="0.7"/>
  <!-- Belly dots on segments -->
  <circle cx="21" cy="32" r="1.5" fill="#E1BEE7" opacity="0.4"/>
  <circle cx="29" cy="34" r="1.3" fill="#E1BEE7" opacity="0.4"/>
  <circle cx="37" cy="36" r="1.2" fill="#E1BEE7" opacity="0.35"/>
  <circle cx="44" cy="37" r="1" fill="#E1BEE7" opacity="0.3"/>
  <!-- Tilted gold crown -->
  <g transform="translate(8, 10) rotate(-15 6 6)" filter="url(#bk-crownglow)">
    <path d="M0 8 L1 3 L4 6 L6 1 L8 6 L11 3 L12 8 Z" fill="url(#bk-crown)" stroke="#E65100" stroke-width="0.4"/>
    <!-- Crown base band -->
    <rect x="0" y="7" width="12" height="2.5" rx="0.5" fill="url(#bk-crown)" stroke="#E65100" stroke-width="0.3"/>
    <!-- Red gem -->
    <ellipse cx="6" cy="5.5" rx="1.5" ry="1.3" fill="url(#bk-gem)" stroke="#B71C1C" stroke-width="0.3"/>
    <circle cx="5.5" cy="5" r="0.4" fill="white" opacity="0.6"/>
    <!-- Small gems on band -->
    <circle cx="3" cy="8.2" r="0.6" fill="#4FC3F7" stroke="#0288D1" stroke-width="0.2"/>
    <circle cx="9" cy="8.2" r="0.6" fill="#4FC3F7" stroke="#0288D1" stroke-width="0.2"/>
  </g>
  <!-- Big arrogant eyes -->
  <ellipse cx="9" cy="23" rx="3.5" ry="4" fill="white" stroke="#4A148C" stroke-width="0.5"/>
  <ellipse cx="16" cy="23" rx="3.5" ry="4" fill="white" stroke="#4A148C" stroke-width="0.5"/>
  <!-- Raised smug eyebrow -->
  <path d="M5 18.5 Q7 17 10.5 18" fill="none" stroke="#4A148C" stroke-width="1" stroke-linecap="round"/>
  <path d="M14 18 Q17 16.5 20 18.5" fill="none" stroke="#4A148C" stroke-width="1" stroke-linecap="round"/>
  <!-- Pupils - looking down smugly -->
  <circle cx="9.5" cy="24" r="2" fill="#1A0033"/>
  <circle cx="16.5" cy="24" r="2" fill="#1A0033"/>
  <circle cx="9" cy="23.2" r="0.7" fill="white"/>
  <circle cx="16" cy="23.2" r="0.7" fill="white"/>
  <!-- Smug derpy grin -->
  <path d="M7 28 Q10 32 16 29" fill="none" stroke="#4A148C" stroke-width="0.9" stroke-linecap="round"/>
  <path d="M8 28.5 Q10 30 13 29" fill="#E1BEE7" opacity="0.3"/>
  <!-- Blush -->
  <ellipse cx="6" cy="27" rx="2" ry="1" fill="#F48FB1" opacity="0.3"/>
  <ellipse cx="19" cy="26" rx="2" ry="1" fill="#F48FB1" opacity="0.3"/>
  <!-- Energy particles around body -->
  <circle cx="3" cy="14" r="1" fill="#CE93D8" opacity="0.6" filter="url(#bk-auraglow)"/>
  <circle cx="50" cy="26" r="1.2" fill="#BA68C8" opacity="0.5" filter="url(#bk-auraglow)"/>
  <circle cx="6" cy="38" r="0.8" fill="#E1BEE7" opacity="0.5"/>
  <circle cx="48" cy="40" r="0.9" fill="#CE93D8" opacity="0.4"/>
  <circle cx="26" cy="14" r="0.7" fill="#E1BEE7" opacity="0.5"/>
  <circle cx="42" cy="22" r="0.8" fill="#BA68C8" opacity="0.4"/>
</svg>