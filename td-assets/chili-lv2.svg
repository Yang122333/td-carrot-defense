<svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 44 44">
  <defs>
    <radialGradient id="chili2-body" cx="48%" cy="42%" r="50%">
      <stop offset="0%" stop-color="#D32F2F"/>
      <stop offset="50%" stop-color="#B71C1C"/>
      <stop offset="100%" stop-color="#7F0000"/>
    </radialGradient>
    <radialGradient id="chili2-highlight" cx="32%" cy="28%" r="38%">
      <stop offset="0%" stop-color="rgba(255,200,200,0.35)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <linearGradient id="chili2-lava" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6D00" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#DD2C00" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="chili2-flame1" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#DD2C00"/>
      <stop offset="30%" stop-color="#FF3D00"/>
      <stop offset="60%" stop-color="#FF6D00"/>
      <stop offset="100%" stop-color="#FFAB00" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="chili2-flame2" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#BF360C"/>
      <stop offset="50%" stop-color="#DD2C00"/>
      <stop offset="100%" stop-color="#FF6D00" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="chili2-flame3" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#FF9100"/>
      <stop offset="100%" stop-color="#FFF9C4" stop-opacity="0.4"/>
    </linearGradient>
    <radialGradient id="chili2-eyeglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF5252"/>
      <stop offset="100%" stop-color="#D50000"/>
    </radialGradient>
    <linearGradient id="chili2-horn" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#4E0000"/>
      <stop offset="100%" stop-color="#880E4F"/>
    </linearGradient>
    <filter id="chili2-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#00000055"/>
    </filter>
    <filter id="chili2-flameglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="chili2-redglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Massive flame - outer -->
  <path d="M12 12 Q8 0 16 -2 Q18 5 22 -3 Q26 4 28 -1 Q34 2 32 12" fill="url(#chili2-flame2)" opacity="0.6" filter="url(#chili2-flameglow)"/>
  <!-- Massive flame - middle -->
  <path d="M14 12 Q12 2 18 0 Q20 6 22 1 Q24 5 26 2 Q30 6 30 12" fill="url(#chili2-flame1)" opacity="0.8" filter="url(#chili2-flameglow)"/>
  <!-- Flame - inner core -->
  <path d="M18 12 Q17 5 22 3 Q26 7 26 12" fill="url(#chili2-flame3)" opacity="0.9"/>
  <!-- Devil horns -->
  <path d="M14 14 L10 5 L16 12" fill="url(#chili2-horn)" stroke="#4E0000" stroke-width="0.4"/>
  <path d="M30 14 L34 5 L28 12" fill="url(#chili2-horn)" stroke="#4E0000" stroke-width="0.4"/>
  <!-- Main body -->
  <ellipse cx="22" cy="27" rx="13" ry="14" fill="url(#chili2-body)" stroke="#4E0000" stroke-width="0.9" filter="url(#chili2-shadow)"/>
  <!-- Lava crack textures -->
  <path d="M14 20 Q16 24 13 28 Q15 32 14 35" fill="none" stroke="url(#chili2-lava)" stroke-width="0.8"/>
  <path d="M30 19 Q28 23 31 27 Q29 31 30 34" fill="none" stroke="url(#chili2-lava)" stroke-width="0.7"/>
  <path d="M20 15 Q22 19 20 23" fill="none" stroke="#FF6D00" stroke-width="0.4" opacity="0.5"/>
  <path d="M24 34 Q22 30 24 26" fill="none" stroke="#FF6D00" stroke-width="0.4" opacity="0.4"/>
  <!-- Body highlight -->
  <ellipse cx="22" cy="27" rx="13" ry="14" fill="url(#chili2-highlight)"/>
  <!-- Glowing red eyes -->
  <ellipse cx="17" cy="24" rx="3.5" ry="3.2" fill="#1A0000" stroke="#4E0000" stroke-width="0.5"/>
  <ellipse cx="17" cy="24" rx="2.2" ry="2" fill="url(#chili2-eyeglow)" filter="url(#chili2-redglow)"/>
  <circle cx="16.5" cy="23.5" r="0.6" fill="#FFCDD2"/>
  <ellipse cx="27" cy="24" rx="3.5" ry="3.2" fill="#1A0000" stroke="#4E0000" stroke-width="0.5"/>
  <ellipse cx="27" cy="24" rx="2.2" ry="2" fill="url(#chili2-eyeglow)" filter="url(#chili2-redglow)"/>
  <circle cx="26.5" cy="23.5" r="0.6" fill="#FFCDD2"/>
  <!-- Fierce angry eyebrows -->
  <path d="M12 19.5 L19 21.5" fill="none" stroke="#4E0000" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M32 19.5 L25 21.5" fill="none" stroke="#4E0000" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Snarling mouth -->
  <path d="M15 31 Q18 35 22 34 Q26 35 29 31" fill="#2C0000"/>
  <polygon points="16,31 18,33.5 20,31" fill="white"/>
  <polygon points="24,31 26,33.5 28,31" fill="white"/>
  <polygon points="20,31 22,34 24,31" fill="white"/>
  <!-- Ember particles -->
  <circle cx="8" cy="8" r="0.8" fill="#FF6D00" opacity="0.7"/>
  <circle cx="36" cy="6" r="0.6" fill="#FFAB00" opacity="0.6"/>
  <circle cx="5" cy="15" r="0.5" fill="#FF9100" opacity="0.5"/>
  <circle cx="39" cy="14" r="0.7" fill="#FF6D00" opacity="0.5"/>
</svg>