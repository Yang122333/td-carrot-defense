<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 36 36">
  <defs>
    <radialGradient id="mush-cap" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#CE93D8"/>
      <stop offset="50%" stop-color="#9C27B0"/>
      <stop offset="100%" stop-color="#6A1B9A"/>
    </radialGradient>
    <radialGradient id="mush-caphigh" cx="38%" cy="30%" r="40%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.4)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <linearGradient id="mush-stem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F5F5"/>
      <stop offset="50%" stop-color="#E0E0E0"/>
      <stop offset="100%" stop-color="#BDBDBD"/>
    </linearGradient>
    <radialGradient id="mush-fog" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#CE93D8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#9C27B0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mush-drip" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#7B1FA2"/>
      <stop offset="100%" stop-color="#4A148C" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="mush-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#00000044"/>
    </filter>
    <filter id="mush-fogglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Purple poison fog at bottom -->
  <ellipse cx="18" cy="34" rx="15" ry="4" fill="url(#mush-fog)" filter="url(#mush-fogglow)"/>
  <ellipse cx="12" cy="33" rx="5" ry="2.5" fill="#CE93D8" opacity="0.2" filter="url(#mush-fogglow)"/>
  <ellipse cx="25" cy="33.5" rx="4" ry="2" fill="#CE93D8" opacity="0.15" filter="url(#mush-fogglow)"/>
  <!-- Stem - short and chunky -->
  <rect x="13" y="22" width="10" height="10" rx="3" fill="url(#mush-stem)" stroke="#9E9E9E" stroke-width="0.5" filter="url(#mush-shadow)"/>
  <!-- Stem ring detail -->
  <ellipse cx="18" cy="24" rx="5.5" ry="1" fill="#E0E0E0" stroke="#BDBDBD" stroke-width="0.3"/>
  <!-- Mushroom cap -->
  <ellipse cx="18" cy="16" rx="15" ry="10" fill="url(#mush-cap)" stroke="#4A148C" stroke-width="0.7" filter="url(#mush-shadow)"/>
  <!-- Cap highlight -->
  <ellipse cx="18" cy="16" rx="15" ry="10" fill="url(#mush-caphigh)"/>
  <!-- White spots on cap -->
  <circle cx="10" cy="13" r="2.5" fill="white" opacity="0.85" stroke="#E0E0E0" stroke-width="0.3"/>
  <circle cx="18" cy="10" r="3" fill="white" opacity="0.85" stroke="#E0E0E0" stroke-width="0.3"/>
  <circle cx="25" cy="12" r="2" fill="white" opacity="0.8" stroke="#E0E0E0" stroke-width="0.3"/>
  <circle cx="7" cy="18" r="1.5" fill="white" opacity="0.7" stroke="#E0E0E0" stroke-width="0.2"/>
  <circle cx="28" cy="17" r="1.8" fill="white" opacity="0.7" stroke="#E0E0E0" stroke-width="0.2"/>
  <circle cx="14" cy="8" r="1.2" fill="white" opacity="0.6"/>
  <!-- Poison drip from cap edge -->
  <path d="M8 20 Q7.5 23 8 25" fill="none" stroke="url(#mush-drip)" stroke-width="1.2" stroke-linecap="round"/>
  <circle cx="8" cy="25.5" r="1" fill="#7B1FA2" opacity="0.7"/>
  <path d="M27 20 Q27.5 22 27 23.5" fill="none" stroke="url(#mush-drip)" stroke-width="0.8" stroke-linecap="round"/>
  <circle cx="27" cy="24" r="0.7" fill="#7B1FA2" opacity="0.6"/>
  <!-- Sleepy squinting eyes -->
  <path d="M13 17 Q15 15.5 17 17" fill="none" stroke="#1A0033" stroke-width="0.9" stroke-linecap="round"/>
  <path d="M19 17 Q21 15.5 23 17" fill="none" stroke="#1A0033" stroke-width="0.9" stroke-linecap="round"/>
  <!-- Tiny sleepy blush -->
  <ellipse cx="12" cy="18.5" rx="1.5" ry="0.8" fill="#E91E63" opacity="0.25"/>
  <ellipse cx="24" cy="18.5" rx="1.5" ry="0.8" fill="#E91E63" opacity="0.25"/>
  <!-- Small sleepy mouth -->
  <ellipse cx="18" cy="20" rx="1.2" ry="0.6" fill="#4A148C" opacity="0.5"/>
  <!-- ZZZ sleep text -->
  <text x="28" y="8" font-size="3.5" fill="#CE93D8" font-weight="bold" opacity="0.7">z</text>
  <text x="31" y="5" font-size="3" fill="#BA68C8" font-weight="bold" opacity="0.5">z</text>
  <text x="33.5" y="2.5" font-size="2.5" fill="#AB47BC" font-weight="bold" opacity="0.4">z</text>
</svg>