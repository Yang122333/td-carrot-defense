<svg xmlns="http://www.w3.org/2000/svg" width="40" height="32" viewBox="0 0 40 32">
  <defs>
    <radialGradient id="beetle-shell" cx="50%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#78909C"/>
      <stop offset="40%" stop-color="#546E7A"/>
      <stop offset="100%" stop-color="#37474F"/>
    </radialGradient>
    <radialGradient id="beetle-high" cx="38%" cy="28%" r="40%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.35)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <linearGradient id="beetle-metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#90A4AE"/>
      <stop offset="50%" stop-color="#607D8B"/>
      <stop offset="100%" stop-color="#455A64"/>
    </linearGradient>
    <radialGradient id="beetle-head" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#6D7B83"/>
      <stop offset="100%" stop-color="#37474F"/>
    </radialGradient>
    <linearGradient id="beetle-rivet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#CFD8DC"/>
      <stop offset="100%" stop-color="#78909C"/>
    </linearGradient>
    <filter id="beetle-shadow" x="-15%" y="-15%" width="130%" height="145%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.2" flood-color="#00000055"/>
    </filter>
    <filter id="beetle-innershadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="0.5" stdDeviation="0.5" flood-color="#00000033"/>
    </filter>
  </defs>
  <!-- Thick legs -->
  <g stroke="#37474F" stroke-width="1.8" fill="none" stroke-linecap="round">
    <path d="M10 20 Q6 24 3 27"/>
    <path d="M13 22 Q10 26 7 29"/>
    <path d="M30 20 Q34 24 37 27"/>
    <path d="M27 22 Q30 26 33 29"/>
    <path d="M8 17 Q4 18 2 20"/>
    <path d="M32 17 Q36 18 38 20"/>
  </g>
  <!-- Leg joints -->
  <g fill="#455A64">
    <circle cx="3" cy="27" r="1.2"/>
    <circle cx="7" cy="29" r="1.2"/>
    <circle cx="37" cy="27" r="1.2"/>
    <circle cx="33" cy="29" r="1.2"/>
    <circle cx="2" cy="20" r="1"/>
    <circle cx="38" cy="20" r="1"/>
  </g>
  <!-- Main shell body -->
  <ellipse cx="20" cy="16" rx="15" ry="11" fill="url(#beetle-shell)" stroke="#263238" stroke-width="0.8" filter="url(#beetle-shadow)"/>
  <!-- Shell center line -->
  <line x1="20" y1="6" x2="20" y2="26" stroke="#263238" stroke-width="0.6"/>
  <!-- Shell highlight -->
  <ellipse cx="20" cy="16" rx="15" ry="11" fill="url(#beetle-high)"/>
  <!-- Metallic reflection streak -->
  <ellipse cx="14" cy="11" rx="4" ry="1.5" fill="white" opacity="0.12" transform="rotate(-25 14 11)"/>
  <ellipse cx="27" cy="12" rx="3" ry="1" fill="white" opacity="0.08" transform="rotate(20 27 12)"/>
  <!-- Scratch marks on shell -->
  <line x1="12" y1="12" x2="16" y2="14" stroke="#90A4AE" stroke-width="0.3" opacity="0.5"/>
  <line x1="24" y1="10" x2="27" y2="13" stroke="#90A4AE" stroke-width="0.3" opacity="0.4"/>
  <line x1="14" y1="18" x2="17" y2="20" stroke="#78909C" stroke-width="0.25" opacity="0.4"/>
  <!-- Rivets on shell -->
  <circle cx="10" cy="10" r="1" fill="url(#beetle-rivet)" stroke="#455A64" stroke-width="0.3"/>
  <circle cx="30" cy="10" r="1" fill="url(#beetle-rivet)" stroke="#455A64" stroke-width="0.3"/>
  <circle cx="10" cy="20" r="1" fill="url(#beetle-rivet)" stroke="#455A64" stroke-width="0.3"/>
  <circle cx="30" cy="20" r="1" fill="url(#beetle-rivet)" stroke="#455A64" stroke-width="0.3"/>
  <circle cx="20" cy="8" r="0.8" fill="url(#beetle-rivet)" stroke="#455A64" stroke-width="0.3"/>
  <circle cx="20" cy="24" r="0.8" fill="url(#beetle-rivet)" stroke="#455A64" stroke-width="0.3"/>
  <!-- Head -->
  <ellipse cx="20" cy="5" rx="6" ry="4" fill="url(#beetle-head)" stroke="#263238" stroke-width="0.6" filter="url(#beetle-innershadow)"/>
  <ellipse cx="20" cy="5" rx="6" ry="4" fill="url(#beetle-high)"/>
  <!-- Small serious eyes -->
  <ellipse cx="17.5" cy="4.5" rx="1.8" ry="1.5" fill="white" stroke="#263238" stroke-width="0.3"/>
  <ellipse cx="22.5" cy="4.5" rx="1.8" ry="1.5" fill="white" stroke="#263238" stroke-width="0.3"/>
  <circle cx="17.8" cy="4.8" r="1" fill="#1A1A1A"/>
  <circle cx="22.8" cy="4.8" r="1" fill="#1A1A1A"/>
  <circle cx="17.4" cy="4.3" r="0.35" fill="white"/>
  <circle cx="22.4" cy="4.3" r="0.35" fill="white"/>
  <!-- Stern brow -->
  <line x1="15.5" y1="3" x2="18.5" y2="3.5" stroke="#263238" stroke-width="0.7" stroke-linecap="round"/>
  <line x1="24.5" y1="3" x2="21.5" y2="3.5" stroke="#263238" stroke-width="0.7" stroke-linecap="round"/>
  <!-- Mandibles -->
  <path d="M17 7 Q16 8.5 17.5 9" fill="none" stroke="#37474F" stroke-width="0.8" stroke-linecap="round"/>
  <path d="M23 7 Q24 8.5 22.5 9" fill="none" stroke="#37474F" stroke-width="0.8" stroke-linecap="round"/>
  <!-- Short antennae -->
  <path d="M16 2.5 Q14 1 13 1.5" fill="none" stroke="#455A64" stroke-width="0.6"/>
  <path d="M24 2.5 Q26 1 27 1.5" fill="none" stroke="#455A64" stroke-width="0.6"/>
</svg>