<svg xmlns="http://www.w3.org/2000/svg" width="160" height="50" viewBox="0 0 160 50">
  <defs>
    <linearGradient id="btnstart-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="50%" stop-color="#43A047"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <linearGradient id="btnstart-top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.3)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <linearGradient id="btnstart-gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="50%" stop-color="#FFC107"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
    <filter id="btnstart-shadow" x="-5%" y="-5%" width="110%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#1B5E2088"/>
    </filter>
    <filter id="btnstart-textshadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="0.8" flood-color="#1B5E20AA"/>
    </filter>
  </defs>
  <!-- Button shadow base -->
  <rect x="6" y="8" width="148" height="38" rx="12" fill="#1B5E20" opacity="0.4"/>
  <!-- Gold border -->
  <rect x="4" y="4" width="152" height="40" rx="13" fill="none" stroke="url(#btnstart-gold)" stroke-width="2.5"/>
  <!-- Main button body -->
  <rect x="6" y="5" width="148" height="37" rx="12" fill="url(#btnstart-bg)" filter="url(#btnstart-shadow)"/>
  <!-- Top highlight (convex effect) -->
  <rect x="10" y="6" width="140" height="16" rx="10" fill="url(#btnstart-top)"/>
  <!-- Inner gold line -->
  <rect x="8" y="6" width="144" height="35" rx="11" fill="none" stroke="#FFD54F" stroke-width="0.5" opacity="0.4"/>
  <!-- Text: 开始游戏 -->
  <text x="80" y="31" text-anchor="middle" font-size="18" fill="white" font-weight="bold" font-family="Arial, sans-serif" filter="url(#btnstart-textshadow)">开始游戏</text>
  <!-- Text inner highlight -->
  <text x="80" y="30" text-anchor="middle" font-size="18" fill="white" font-weight="bold" font-family="Arial, sans-serif" opacity="0.9">开始游戏</text>
</svg>