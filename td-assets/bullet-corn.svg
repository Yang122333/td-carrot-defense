<svg xmlns="http://www.w3.org/2000/svg" width="8" height="8" viewBox="0 0 8 8">
  <defs>
    <radialGradient id="bcorn-grad" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#FFF9C4"/>
      <stop offset="40%" stop-color="#FFD600"/>
      <stop offset="100%" stop-color="#F9A825"/>
    </radialGradient>
    <filter id="bcorn-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Motion trail -->
  <ellipse cx="2" cy="4" rx="1.5" ry="1" fill="#FFD600" opacity="0.25"/>
  <ellipse cx="1" cy="4" rx="1" ry="0.6" fill="#FFAB00" opacity="0.15"/>
  <!-- Corn kernel -->
  <ellipse cx="4.5" cy="4" rx="2.5" ry="2.8" fill="url(#bcorn-grad)" stroke="#E6A200" stroke-width="0.3" filter="url(#bcorn-glow)"/>
  <!-- Highlight -->
  <ellipse cx="3.8" cy="3" rx="0.8" ry="1" fill="white" opacity="0.4"/>
</svg>