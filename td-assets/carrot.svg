<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <defs>
    <radialGradient id="carrot-body" cx="48%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#FFAB40"/>
      <stop offset="40%" stop-color="#FF9100"/>
      <stop offset="100%" stop-color="#E65100"/>
    </radialGradient>
    <radialGradient id="carrot-high" cx="35%" cy="30%" r="40%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.45)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <linearGradient id="carrot-leaf" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#388E3C"/>
      <stop offset="50%" stop-color="#4CAF50"/>
      <stop offset="100%" stop-color="#81C784"/>
    </linearGradient>
    <linearGradient id="carrot-dirt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8D6E4C"/>
      <stop offset="100%" stop-color="#5D4037"/>
    </linearGradient>
    <radialGradient id="carrot-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD600" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#FFAB00" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FF8F00" stop-opacity="0"/>
    </radialGradient>
    <filter id="carrot-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.2" flood-color="#00000044"/>
    </filter>
    <filter id="carrot-goldglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Golden glow aura -->
  <ellipse cx="24" cy="28" rx="22" ry="18" fill="url(#carrot-glow)" filter="url(#carrot-goldglow)"/>
  <!-- Star particles -->
  <text x="6" y="12" font-size="4" fill="#FFD600" opacity="0.7">✦</text>
  <text x="38" y="16" font-size="3.5" fill="#FFAB00" opacity="0.6">✦</text>
  <text x="10" y="40" font-size="3" fill="#FFD600" opacity="0.5">✦</text>
  <text x="36" y="38" font-size="3.5" fill="#FFE082" opacity="0.6">✦</text>
  <text x="4" y="26" font-size="2.5" fill="#FFC107" opacity="0.5">✦</text>
  <text x="42" y="28" font-size="2.5" fill="#FFC107" opacity="0.5">✦</text>
  <!-- Dirt base -->
  <ellipse cx="24" cy="44" rx="14" ry="3.5" fill="url(#carrot-dirt)" opacity="0.7"/>
  <ellipse cx="24" cy="44.5" rx="10" ry="2" fill="#A1887F" opacity="0.3"/>
  <!-- Main carrot body -->
  <path d="M16 18 Q14 28 17 38 Q20 44 24 45 Q28 44 31 38 Q34 28 32 18 Q28 14 24 14 Q20 14 16 18Z" fill="url(#carrot-body)" stroke="#BF360C" stroke-width="0.7" filter="url(#carrot-shadow)"/>
  <!-- Carrot highlight -->
  <path d="M16 18 Q14 28 17 38 Q20 44 24 45 Q28 44 31 38 Q34 28 32 18 Q28 14 24 14 Q20 14 16 18Z" fill="url(#carrot-high)"/>
  <!-- Carrot texture lines -->
  <path d="M19 20 Q20 28 19 36" fill="none" stroke="#E65100" stroke-width="0.3" opacity="0.4"/>
  <path d="M24 16 Q24 28 24 42" fill="none" stroke="#E65100" stroke-width="0.3" opacity="0.3"/>
  <path d="M29 20 Q28 28 29 36" fill="none" stroke="#E65100" stroke-width="0.3" opacity="0.4"/>
  <!-- Horizontal rings -->
  <path d="M17 22 Q24 20 31 22" fill="none" stroke="#BF360C" stroke-width="0.25" opacity="0.3"/>
  <path d="M16 28 Q24 26 32 28" fill="none" stroke="#BF360C" stroke-width="0.25" opacity="0.3"/>
  <path d="M17 34 Q24 32 31 34" fill="none" stroke="#BF360C" stroke-width="0.25" opacity="0.3"/>
  <!-- Glossy shine -->
  <ellipse cx="20" cy="24" rx="2" ry="6" fill="white" opacity="0.15" transform="rotate(-8 20 24)"/>
  <!-- Lush green leaves -->
  <path d="M24 14 Q20 6 14 2" fill="none" stroke="#2E7D32" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M14 2 Q18 5 20 10" fill="url(#carrot-leaf)" opacity="0.9"/>
  <path d="M24 14 Q24 4 24 1" fill="none" stroke="#388E3C" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M22 1 Q24 5 26 1" fill="url(#carrot-leaf)" opacity="0.9"/>
  <path d="M24 14 Q28 6 34 3" fill="none" stroke="#2E7D32" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M34 3 Q30 6 28 10" fill="url(#carrot-leaf)" opacity="0.9"/>
  <!-- Extra small leaves -->
  <path d="M24 13 Q18 8 12 6" fill="none" stroke="#43A047" stroke-width="0.8" stroke-linecap="round"/>
  <path d="M24 13 Q30 8 36 6" fill="none" stroke="#43A047" stroke-width="0.8" stroke-linecap="round"/>
  <!-- Leaf highlights -->
  <path d="M20 6 Q22 4 24 5" fill="none" stroke="#A5D6A7" stroke-width="0.4" opacity="0.6"/>
  <path d="M26 5 Q28 4 30 6" fill="none" stroke="#A5D6A7" stroke-width="0.4" opacity="0.6"/>
</svg>