<svg xmlns="http://www.w3.org/2000/svg" width="300" height="60" viewBox="0 0 300 60">
  <defs>
    <!-- 萝 - orange -->
    <linearGradient id="title-g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFA940"/>
      <stop offset="100%" stop-color="#E86A10"/>
    </linearGradient>
    <!-- 卜 - green -->
    <linearGradient id="title-g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#73D13D"/>
      <stop offset="100%" stop-color="#389E0D"/>
    </linearGradient>
    <!-- 保 - blue -->
    <linearGradient id="title-g3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#69C0FF"/>
      <stop offset="100%" stop-color="#1D6FD0"/>
    </linearGradient>
    <!-- 卫 - purple -->
    <linearGradient id="title-g4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D3ADF7"/>
      <stop offset="100%" stop-color="#9254DE"/>
    </linearGradient>
    <!-- 战 - red -->
    <linearGradient id="title-g5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF7875"/>
      <stop offset="100%" stop-color="#CF1322"/>
    </linearGradient>
    <!-- stroke outline gradient -->
    <linearGradient id="title-stroke" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5A3200"/>
      <stop offset="100%" stop-color="#2C1800"/>
    </linearGradient>
    <!-- drop shadow -->
    <filter id="title-shadow" x="-5%" y="-5%" width="110%" height="130%">
      <feDropShadow dx="1.5" dy="2.5" stdDeviation="1.2" flood-color="#3B1500" flood-opacity="0.45"/>
    </filter>
    <!-- carrot body -->
    <linearGradient id="title-carrot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFA940"/>
      <stop offset="100%" stop-color="#E8600A"/>
    </linearGradient>
    <!-- leaf -->
    <linearGradient id="title-leaf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#95DE64"/>
      <stop offset="100%" stop-color="#389E0D"/>
    </linearGradient>
  </defs>

  <!-- left carrot decoration -->
  <g transform="translate(18,10) rotate(-15)">
    <path d="M0 0 L3 18 L-3 18 Z" fill="url(#title-carrot)"/>
    <ellipse cx="-2" cy="-1" rx="3" ry="5" fill="url(#title-leaf)" transform="rotate(-30 -2 -1)"/>
    <ellipse cx="2" cy="-2" rx="2.5" ry="5" fill="url(#title-leaf)" transform="rotate(20 2 -2)"/>
    <ellipse cx="0" cy="-1" rx="2" ry="4.5" fill="url(#title-leaf)"/>
    <!-- carrot lines -->
    <line x1="-1.5" y1="7" x2="1.5" y2="7" stroke="#D4600A" stroke-width="0.4" opacity="0.5"/>
    <line x1="-1.2" y1="10" x2="1.2" y2="10" stroke="#D4600A" stroke-width="0.4" opacity="0.5"/>
    <line x1="-0.8" y1="13" x2="0.8" y2="13" stroke="#D4600A" stroke-width="0.4" opacity="0.5"/>
  </g>

  <!-- right carrot decoration -->
  <g transform="translate(282,10) rotate(15)">
    <path d="M0 0 L3 18 L-3 18 Z" fill="url(#title-carrot)"/>
    <ellipse cx="-2" cy="-1" rx="3" ry="5" fill="url(#title-leaf)" transform="rotate(-30 -2 -1)"/>
    <ellipse cx="2" cy="-2" rx="2.5" ry="5" fill="url(#title-leaf)" transform="rotate(20 2 -2)"/>
    <ellipse cx="0" cy="-1" rx="2" ry="4.5" fill="url(#title-leaf)"/>
    <line x1="-1.5" y1="7" x2="1.5" y2="7" stroke="#D4600A" stroke-width="0.4" opacity="0.5"/>
    <line x1="-1.2" y1="10" x2="1.2" y2="10" stroke="#D4600A" stroke-width="0.4" opacity="0.5"/>
    <line x1="-0.8" y1="13" x2="0.8" y2="13" stroke="#D4600A" stroke-width="0.4" opacity="0.5"/>
  </g>

  <!-- small leaf accents -->
  <ellipse cx="38" cy="48" rx="5" ry="2.5" fill="url(#title-leaf)" opacity="0.6" transform="rotate(-25 38 48)"/>
  <ellipse cx="262" cy="48" rx="5" ry="2.5" fill="url(#title-leaf)" opacity="0.6" transform="rotate(25 262 48)"/>

  <!-- title text: 萝卜保卫战 -->
  <g filter="url(#title-shadow)">
    <!-- shadow / 3D extrude layer -->
    <text x="150" y="44" font-family="'Arial Black','Microsoft YaHei',sans-serif" font-size="36" font-weight="900" text-anchor="middle" letter-spacing="6" fill="#3B1500" opacity="0.3" transform="translate(1.5,2)">萝卜保卫战</text>

    <!-- dark outline -->
    <text x="150" y="44" font-family="'Arial Black','Microsoft YaHei',sans-serif" font-size="36" font-weight="900" text-anchor="middle" letter-spacing="6" stroke="url(#title-stroke)" stroke-width="4" stroke-linejoin="round" fill="none">萝卜保卫战</text>

    <!-- colored fills per character using clipPath trick: overlay individual rects -->
    <!-- base white fill for clean edges -->
    <text x="150" y="44" font-family="'Arial Black','Microsoft YaHei',sans-serif" font-size="36" font-weight="900" text-anchor="middle" letter-spacing="6" fill="white" stroke="none">萝卜保卫战</text>
  </g>

  <!-- individual colored characters layered on top -->
  <g font-family="'Arial Black','Microsoft YaHei',sans-serif" font-size="36" font-weight="900">
    <text x="57" y="44" fill="url(#title-g1)">萝</text>
    <text x="101" y="44" fill="url(#title-g2)">卜</text>
    <text x="145" y="44" fill="url(#title-g3)">保</text>
    <text x="189" y="44" fill="url(#title-g4)">卫</text>
    <text x="233" y="44" fill="url(#title-g5)">战</text>
  </g>

  <!-- top shine on text area -->
  <rect x="50" y="12" width="200" height="16" rx="8" fill="white" opacity="0.12"/>
</svg>
