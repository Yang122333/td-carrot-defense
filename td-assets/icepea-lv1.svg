<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">
  <defs>
    <radialGradient id="ice1-body" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#E0F7FA"/>
      <stop offset="40%" stop-color="#80DEEA"/>
      <stop offset="100%" stop-color="#0097A7"/>
    </radialGradient>
    <radialGradient id="ice1-inner" cx="40%" cy="35%" r="45%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.5)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <linearGradient id="ice1-frost" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#B2EBF2" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#006064" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="ice1-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#00000033"/>
    </filter>
    <filter id="ice1-frostglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="ice1-frostbase" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#B2EBF2" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#80DEEA" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Frost base effect -->
  <ellipse cx="20" cy="37" rx="14" ry="3.5" fill="url(#ice1-frostbase)" filter="url(#ice1-frostglow)"/>
  <ellipse cx="20" cy="37.5" rx="10" ry="2" fill="#B2EBF2" opacity="0.4"/>
  <!-- Ice crystal ground details -->
  <polygon points="10,36 12,33 14,36" fill="#E0F7FA" opacity="0.5"/>
  <polygon points="26,36 28,33.5 30,36" fill="#E0F7FA" opacity="0.4"/>
  <!-- Main body - round pea pod -->
  <ellipse cx="20" cy="22" rx="12" ry="13" fill="url(#ice1-body)" stroke="#00838F" stroke-width="0.7" filter="url(#ice1-shadow)" opacity="0.92"/>
  <!-- Ice crystal texture lines -->
  <path d="M14 16 L16 20 L13 24" fill="none" stroke="#B2EBF2" stroke-width="0.4" opacity="0.6"/>
  <path d="M26 15 L24 19 L27 23" fill="none" stroke="#B2EBF2" stroke-width="0.4" opacity="0.6"/>
  <path d="M18 11 L20 15 L22 11" fill="none" stroke="#E0F7FA" stroke-width="0.3" opacity="0.5"/>
  <path d="M16 28 L20 32 L24 28" fill="none" stroke="#B2EBF2" stroke-width="0.3" opacity="0.5"/>
  <!-- Inner highlight -->
  <ellipse cx="20" cy="22" rx="12" ry="13" fill="url(#ice1-inner)"/>
  <!-- Half-closed cool eyes -->
  <g>
    <!-- Left eye -->
    <ellipse cx="16" cy="20" rx="3" ry="2" fill="white" stroke="#00695C" stroke-width="0.4"/>
    <!-- Eyelid (half closed) -->
    <path d="M13 20 Q16 17.5 19 20" fill="#0097A7" opacity="0.5"/>
    <ellipse cx="16.5" cy="20.5" rx="1.5" ry="1.3" fill="#004D40"/>
    <circle cx="16" cy="20" r="0.5" fill="#B2EBF2"/>
    <!-- Right eye -->
    <ellipse cx="24" cy="20" rx="3" ry="2" fill="white" stroke="#00695C" stroke-width="0.4"/>
    <path d="M21 20 Q24 17.5 27 20" fill="#0097A7" opacity="0.5"/>
    <ellipse cx="24.5" cy="20.5" rx="1.5" ry="1.3" fill="#004D40"/>
    <circle cx="24" cy="20" r="0.5" fill="#B2EBF2"/>
  </g>
  <!-- Cool slight frown -->
  <path d="M17 25 Q20 24 23 25" fill="none" stroke="#004D40" stroke-width="0.7" stroke-linecap="round"/>
  <!-- Ice mist particles on top -->
  <circle cx="15" cy="8" r="1.2" fill="#E0F7FA" opacity="0.6" filter="url(#ice1-frostglow)"/>
  <circle cx="20" cy="6" r="1.5" fill="#B2EBF2" opacity="0.5" filter="url(#ice1-frostglow)"/>
  <circle cx="25" cy="7.5" r="1" fill="#E0F7FA" opacity="0.7" filter="url(#ice1-frostglow)"/>
  <circle cx="12" cy="9" r="0.8" fill="#80DEEA" opacity="0.5"/>
  <circle cx="28" cy="9.5" r="0.9" fill="#80DEEA" opacity="0.4"/>
  <!-- Small ice crystal decorations -->
  <polygon points="20,3 20.5,5 21,3 20.5,4" fill="#E0F7FA" opacity="0.7"/>
  <polygon points="10,14 11,16 12,14 11,15" fill="#B2EBF2" opacity="0.5"/>
  <polygon points="28,13 29,15 30,13 29,14" fill="#B2EBF2" opacity="0.5"/>
</svg>